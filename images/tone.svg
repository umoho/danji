    <g s:x="5" s:y="0" s:pid="A" s:position="top"/>
    <g s:x="5" s:y="50" s:pid="B" s:position="bottom"/>
  </g>
  <g s:type="capacitor_v" s:width="30" s:height="50" transform="translate(12,152)" id="cell_C_treble">
