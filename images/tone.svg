<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:s="https://github.com/nturley/netlistsvg" width="178" height="279">
  <style>svg {
    stroke: #000;
    fill: none;
  }
  text {
    fill: #000;
    stroke: none;
    font-size: 10px;
    font-weight: bold;
    font-family: "Courier New", monospace;
  }
  .nodelabel {
    text-anchor: middle;
  }
  .inputPortLabel {
    text-anchor: end;
  }
  .splitjoinBody {
    fill: #000;
  }
  .symbol {
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-width: 2;
  }
  .detail {
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: #000;
  }</style><rect width="100%" height="100%" fill="white"/>
  <g s:type="resistor_v" s:width="10" s:height="50" transform="translate(22,97)" id="cell_R_treble">
