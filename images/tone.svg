    <text x="15" y="15" s:attribute="ref" class="cell_R_treble">R_treble</text>
    <text x="15" y="30" s:attribute="value" class="cell_R_treble">100kΩ</text>
    <path d="M0,10 V40 H10 V10 Z" class="symbol cell_R_treble"/>
